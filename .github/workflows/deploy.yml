name: Deploy to EC2
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/mysite
            git pull origin main
            sudo nginx -t
            sudo systemctl reload nginx

      - name: 배포 성공 알림
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"content":"✅ 배포 성공! ${{ github.repository }} (${{ github.actor }})"}' \
            ${{ secrets.WEBHOOK_URL }}

      - name: 배포 실패 알림
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"content":"❌ 배포 실패! 로그 확인 필요: ${{ github.repository }}"}' \
            ${{ secrets.WEBHOOK_URL }}
